  <!-- React Code in Babel Script -->

    const { useState, useEffect } = React;

    // Default Demo Data based on the uploaded report & additional realistic data
    const initialStudents = [
      {

      {

        sat: 85,
        psikotes: "Kemampuan verbal sangat baik, daya ingat kuat untuk hafalan.",
        progres_1s: "Peningkatan pesat di akhir semester, menunjukkan motivasi belajar yang tinggi.",
        mapel_unggul: "Bahasa Arab, Hadits",

        tahfizh_juz: 5,
        tahfizh_detail: "5 Juz (Juz 30, 29, 28, dan Al-Baqarah awal)",
        disiplin: "Sangat disiplin, selalu menjaga kerapihan asrama dan pakaian.",
        sosial: "Memiliki jiwa kepemimpinan tinggi, dipercaya menjadi ketua kelas.",
        prestasi: "Juara 1 Lomba Pidato Bahasa Arab tingkat Kabupaten.",
        fokus: "Fokus melatih logika matematika dasar dan konsistensi murajaah hafalan baru.",
        pesan_wali: "Pertahankan prestasi gemilang ini, Nak. Tetaplah rendah hati dan jadilah pelopor kebaikan di asrama.",
        wali_kelas: "Ustadz Maulana Azka, Lc.",
        wali_kamar: "Ustadz Ali Murtadlo",
        kepala_sekolah: "Ustadz Abd. Halim, S.S.I"
      },
      {
        id: "3",
        nama: "Zayyan Ahmad Al-Ghifari",
        nis: "NIS-003/7 A Putra",
        sas: 90,
        sat: 92,
        psikotes: "Kecerdasan numerik superior dengan kemampuan analitis tinggi.",
        progres_1s: "Konsisten mempertahankan nilai akademis tinggi sepanjang semester.",
        mapel_unggul: "IPA, Matematika, Fiqih",
        mapel_perlu: "Bahasa Inggris",
        ibadah: "Ibadah wajib tertib. Perlu pembiasaan lebih untuk qiyamul lail.",
        tahfizh_juz: 4,
        tahfizh_detail: "4 Juz (Juz 30, 29, dan Surah pilihan)",
        disiplin: "Disiplin baik, perlu diingatkan untuk bangun lebih awal saat subuh.",
        sosial: "Pendiam namun kooperatif dalam kerja kelompok.",
        prestasi: "Harapan 2 Olimpiade Sains Nasional (OSN) Matematika.",
        fokus: "Meningkatkan kemampuan komunikasi bahasa asing serta keaktifan bersosialisasi.",
        pesan_wali: "Masya Allah, kemampuan akademis luar biasa. Seimbangkan dengan keaktifan sosial dan dakwah ya.",
        wali_kelas: "Ustadz Maulana Azka, Lc.",
        wali_kamar: "Ustadz Ali Murtadlo",
        kepala_sekolah: "Ustadz Abd. Halim, S.S.I"
      }
    ];

    function App() {
      // Load initial students data from localStorage or fallback to defaults
      const [students, setStudents] = useState(() => {
        const saved = localStorage.getItem('malika_rapor_students');
        return saved ? JSON.parse(saved) : initialStudents;
      });

      // Global Settings State for Semester and Date (Shared across all students in LocalStorage)
      const [globalSemester, setGlobalSemester] = useState(() => {
        return localStorage.getItem('malika_rapor_semester') || "Ganjil 2025/2026";
      });
      const [globalTanggal, setGlobalTanggal] = useState(() => {
        return localStorage.getItem('malika_rapor_tanggal') || "19 Desember 2025";
      });

      const [activeTab, setActiveTab] = useState('report'); // report, database
      const [selectedStudentId, setSelectedStudentId] = useState(() => {
        return students[0]?.id || "1";
      });
      const [bulkImportText, setBulkImportText] = useState("");
      const [showImportModal, setShowImportModal] = useState(false);
      const [editingStudent, setEditingStudent] = useState(null);
      const [isAddingNew, setIsAddingNew] = useState(false);
      
      // Custom dialog alert & confirmation state to replace window.alert / window.confirm
      const [alertConfig, setAlertConfig] = useState(null);

      // Sync data to localStorage automatically when state changes
      useEffect(() => {
        localStorage.setItem('malika_rapor_students', JSON.stringify(students));
      }, [students]);

      useEffect(() => {
        localStorage.setItem('malika_rapor_semester', globalSemester);
      }, [globalSemester]);

      useEffect(() => {
        localStorage.setItem('malika_rapor_tanggal', globalTanggal);
      }, [globalTanggal]);

      const selectedStudent = students.find(s => s.id === selectedStudentId) || students[0] || null;

      // Indexing for Santri Next/Prev navigation
      const currentIndex = students.findIndex(s => s.id === selectedStudentId);

      // Custom alert / confirmation trigger helpers
      const triggerAlert = (message, title = "Informasi") => {
        setAlertConfig({ type: 'alert', title, message });
      };

      const triggerConfirm = (message, onConfirm, title = "Konfirmasi Tindakan") => {
        setAlertConfig({ type: 'confirm', title, message, onConfirm });
      };

      const handlePrev = () => {
        if (students.length === 0) return;
        if (currentIndex > 0) {
          setSelectedStudentId(students[currentIndex - 1].id);
        } else {
          setSelectedStudentId(students[students.length - 1].id); // Cycle to end
        }
      };

      const handleNext = () => {
        if (students.length === 0) return;
        if (currentIndex < students.length - 1) {
          setSelectedStudentId(students[currentIndex + 1].id);
        } else {
          setSelectedStudentId(students[0].id); // Cycle to start
        }
      };

      // Save/Update student data locally
      const handleSaveStudent = (studentData) => {
        const studentId = isAddingNew ? Date.now().toString() : studentData.id;
        const updatedPayload = {
          ...studentData,
          id: studentId,
          sas: Number(studentData.sas) || 80,
          sat: Number(studentData.sat) || 80,
          tahfizh_juz: Number(studentData.tahfizh_juz) || 0
        };

        if (isAddingNew) {
          setStudents([...students, updatedPayload]);
          setSelectedStudentId(studentId);
        } else {
          setStudents(students.map(s => s.id === studentId ? updatedPayload : s));
        }
        setEditingStudent(null);
        setIsAddingNew(false);
      };

      // Delete student from local state
      const handleDeleteStudent = (id) => {
        triggerConfirm("Apakah Anda yakin ingin menghapus data santri ini secara permanen?", () => {
          const filtered = students.filter(s => s.id !== id);
          setStudents(filtered);
          if (selectedStudentId === id && filtered.length > 0) {
            setSelectedStudentId(filtered[0].id);
          }
        });
      };

      // Download All Students Database directly as Excel-compatible CSV
      const handleDownloadExcel = () => {
        if (students.length === 0) {
          triggerAlert("Tidak ada data siswa untuk diunduh.", "Data Kosong");
          return;
        }

        const headers = [
          "Nama Lengkap", "NIS/Kelas", "Nilai SAS (Ganjil)", "Nilai SAT (Genap)", 
          "Hasil Psikotes", "Progres 1 Semester", "Mapel Unggul", "Mapel Perlu Peningkatan", 
          "Observasi Ibadah Harian", "Tahfizh (Juz)", "Keterangan Tahfizh", "Sikap dan Disiplin", 
          "Sosial dan Kepemimpinan", "Prestasi Non-Akademik", "Fokus Kelas Selanjutnya", "Pesan Wali Kelas",
          "Wali Kelas", "Wali Kamar", "Kepala Sekolah"
        ];

        const rows = students.map(s => [
          s.nama || "",
          s.nis || "",
          s.sas || 80,
          s.sat || 80,
          s.psikotes || "",
          s.progres_1s || "",
          s.mapel_unggul || "",
          s.mapel_perlu || "",
          s.ibadah || "",
          s.tahfizh_juz || 0,
          s.tahfizh_detail || "",
          s.disiplin || "",
          s.sosial || "",
          s.prestasi || "",
          s.fokus || "",
          s.pesan_wali || "",
          s.wali_kelas || "Ustadz Maulana Azka, Lc.",
          s.wali_kamar || "Ustadz Ali Murtadlo",
          s.kepala_sekolah || "Ustadz Abd. Halim, S.S.I"
        ]);

        const escapeCSV = (val) => {
          if (val === undefined || val === null) return '';
          let str = String(val);
          str = str.replace(/"/g, '""'); // Escape double quotes
          if (str.includes(',') || str.includes('\n') || str.includes('\r') || str.includes('"') || str.includes(';')) {
            return `"${str}"`;
          }
          return str;
        };

        const csvContent = "\uFEFF" + [
          headers.join(";"),
          ...rows.map(r => r.map(escapeCSV).join(";"))
        ].join("\n");

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        const sanitizedSemesterName = globalSemester.replace(/[\/\s]/g, '_');
        
        link.setAttribute("href", url);
        link.setAttribute("download", `database_rapor_malika_${sanitizedSemesterName}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      // Process TSV/Spreadsheet imports locally
      const handleImportTSV = () => {
        try {
          const lines = bulkImportText.trim().split("\n");
          if (lines.length < 2) {
            triggerAlert("Mohon masukkan format baris data yang valid beserta baris tajuk (header) kolomnya.", "Gagal Impor");
            return;
          }
          
          const headers = lines[0].toLowerCase().split("\t").map(h => h.trim());
          const newStudents = [];

          for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            const cols = lines[i].split("\t").map(c => c.trim());
            const rowObj = {};
            
            headers.forEach((header, index) => {
              let key = header;
              if (header.includes("nama")) key = "nama";
              else if (header.includes("nis")) key = "nis";
              else if (header.includes("sas") || header.includes("ganjil") || header.includes("ats")) key = "sas";
              else if (header.includes("sat") || header.includes("genap")) key = "sat";
              else if (header.includes("psikotes")) key = "psikotes";
              else if (header.includes("progres")) key = "progres_1s";
              else if (header.includes("unggul")) key = "mapel_unggul";
              else if (header.includes("perlu")) key = "mapel_perlu";
              else if (header.includes("ibadah")) key = "ibadah";
              else if (header.includes("tahfizh_juz") || header.includes("juz")) key = "tahfizh_juz";
              else if (header.includes("tahfizh_detail") || header.includes("keterangan tahfizh")) key = "tahfizh_detail";
              else if (header.includes("disiplin")) key = "disiplin";
              else if (header.includes("sosial")) key = "sosial";
              else if (header.includes("prestasi")) key = "prestasi";
              else if (header.includes("fokus")) key = "fokus";
              else if (header.includes("pesan")) key = "pesan_wali";
              else if (header.includes("wali_kelas") || header.includes("wali kelas")) key = "wali_kelas";
              else if (header.includes("wali_kamar") || header.includes("wali kamar")) key = "wali_kamar";
              else if (header.includes("kepala_sekolah") || header.includes("kepala sekolah")) key = "kepala_sekolah";

              rowObj[key] = cols[index];
            });

            rowObj.id = (Date.now() + i).toString();
            rowObj.sas = Number(rowObj.sas) || Number(rowObj.ats) || 80;
            rowObj.sat = Number(rowObj.sat) || 80;
            rowObj.tahfizh_juz = Number(rowObj.tahfizh_juz) || 0;

            rowObj.nama = rowObj.nama || "Santri Baru";
            rowObj.nis = rowObj.nis || "NIS-xxx";
            rowObj.psikotes = rowObj.psikotes || "Potensi kognitif baik.";
            rowObj.progres_1s = rowObj.progres_1s || "Perkembangan sesuai harapan.";
            rowObj.mapel_unggul = rowObj.mapel_unggul || "-";
            rowObj.mapel_perlu = rowObj.mapel_perlu || "-";
            rowObj.ibadah = rowObj.ibadah || "Wajib baik, sunnah perlu pembiasaan.";
            rowObj.tahfizh_detail = rowObj.tahfizh_detail || `${rowObj.tahfizh_juz} Juz`;
            rowObj.disiplin = rowObj.disiplin || "Disiplin.";
            rowObj.sosial = rowObj.sosial || "Interaksi baik.";
            rowObj.prestasi = rowObj.prestasi || "-";
            rowObj.fokus = rowObj.fokus || "Pertahankan prestasi.";
            rowObj.pesan_wali = rowObj.pesan_wali || "Tingkatkan ibadah dan belajar.";
            
            rowObj.wali_kelas = rowObj.wali_kelas || "Ustadz Maulana Azka, Lc.";
            rowObj.wali_kamar = rowObj.wali_kamar || "Ustadz Ali Murtadlo";
            rowObj.kepala_sekolah = rowObj.kepala_sekolah || "Ustadz Abd. Halim, S.S.I";

            newStudents.push(rowObj);
          }

          setStudents([...students, ...newStudents]);
          setShowImportModal(false);
          setBulkImportText("");
          triggerAlert(`Berhasil mengimpor ${newStudents.length} data santri ke dalam sistem.`, "Impor Sukses");
        } catch (err) {
          triggerAlert("Format data spreadsheet tidak valid. Pastikan Anda telah menyalin tabel baris data dari Google Sheets / Excel secara lengkap.", "Kesalahan Impor");
        }
      };

      const getTemplateTSV = () => {
        const headers = "Nama\tNIS\tSAS\tSAT\tPsikotes\tProgres\tUnggul\tPerlu\tIbadah\tJuz\tKeterangan Tahfizh\tDisiplin\tSosial\tPrestasi\tFokus\tPesan Wali\tWali Kelas\tWali Kamar\tKepala Sekolah\n";
        const row = "Ahmad Syarif\tNIS-009/7 A\t85\t88\tPotensi kognitif tinggi\tKemajuan pesat\tMatematika\tSeni Budaya\tShalat berjamaah disiplin\t4\t4 Juz lancar\tSangat rapi\tAktif memimpin\tJuara Adzan\tIstiqamah murajaah\tJaga semangat!\tUstadz Maulana Azka, Lc.\tUstadz Ali Murtadlo\tUstadz Abd. Halim, S.S.I";
        setBulkImportText(headers + row);
      };

      const handlePrint = () => {
        window.print();
      };

      const calculateChange = (student) => {
        if (!student || !student.sas) return { percent: "0", positive: true };
        const diff = student.sat - student.sas;
        const percent = ((diff / student.sas) * 100).toFixed(1);
        return {
          percent: Math.abs(percent),
          positive: diff >= 0
        };
      };

      const progress = selectedStudent ? calculateChange(selectedStudent) : { percent: "0", positive: true };

      return (
        <div className="min-h-screen bg-slate-100 flex flex-col font-sans text-slate-800">

          {/* Navbar */}
          <header className="bg-[#2b3990] text-white shadow-md print:hidden">
            <div className="max-w-4xl mx-auto px-4 py-3 flex flex-col sm:flex-row justify-between items-center gap-4">
              <div className="flex items-center gap-3">
                <div className="w-10 h-10 rounded-full bg-white flex items-center justify-center shadow-inner overflow-hidden p-1">
                  <img src="https://iili.io/FsLlXA7.png" alt="Logo Malika" className="w-full h-full object-contain" />
                </div>
                <div>
                  <h1 className="text-lg font-extrabold tracking-wide">MALIKA ISLAMIC BOARDING SCHOOL</h1>
                  <p className="text-[10px] text-indigo-200">Sistem Laporan Holistik Santri • Cetak PDF Presisi</p>
                </div>
              </div>
              
              <nav className="flex gap-2">
                <button 
                  onClick={() => setActiveTab('report')}
                  className={`px-4 py-2 rounded-lg text-xs font-semibold tracking-wider uppercase transition-all ${activeTab === 'report' ? 'bg-white text-[#2b3990] shadow' : 'text-indigo-100 hover:bg-[#1f2a70]'}`}
                >
                  📄 Rapor Holistik
                </button>
                <button 
                  onClick={() => setActiveTab('database')}
                  className={`px-4 py-2 rounded-lg text-xs font-semibold tracking-wider uppercase transition-all ${activeTab === 'database' ? 'bg-white text-[#2b3990] shadow' : 'text-indigo-100 hover:bg-[#1f2a70]'}`}
                >
                  🗃️ Database Spreadsheet
                </button>
              </nav>
            </div>
          </header>

          {/* Main Content Area */}
          <div className="flex-grow max-w-4xl mx-auto w-full p-4 print:p-0">
            
            {/* Helper Notification Banner for iframe prints */}
            {activeTab === 'report' && (
              <div className="no-print bg-amber-50 border border-amber-200 rounded-xl p-3.5 mb-4 text-xs text-amber-900 flex items-start gap-2.5">
                <span className="text-base">💡</span>
                <div>
                  <p className="font-bold">Tips Cetak Rapor (PDF A4 Presisi):</p>
                  <p className="mt-0.5 leading-relaxed">
                    Untuk mencetak, silakan klik tombol <strong>Cetak Rapor (PDF)</strong> di kanan atas. Jika menu print terblokir, silakan klik kanan area kertas putih rapor di bawah, lalu pilih <strong>"Print Frame..."</strong> atau tekan tombol kombinasi <strong>Ctrl + P</strong> (<strong>Cmd + P</strong> di Mac).
                  </p>
                </div>
              </div>
            )}

            {/* GLOBAL SETTINGS PANEL */}
            {activeTab === 'report' && (
              <div className="no-print bg-white p-4 rounded-2xl shadow-sm border border-slate-200 mb-4">
                <div className="flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                  <div>
                    <div className="flex items-center gap-2">
                      <h4 className="text-xs font-black text-[#2b3990] uppercase tracking-wider">⚙️ Pengaturan Global (Semua Santri)</h4>
                      <span className="text-[9px] bg-emerald-50 text-emerald-800 font-extrabold px-1.5 py-0.5 rounded flex items-center gap-1">
                        <span>💾</span> Penyimpanan Lokal Aktif
                      </span>
                    </div>
                    <p className="text-[10px] text-slate-400 font-semibold mt-0.5">Nilai semester dan tanggal laporan di bawah ini akan diterapkan secara seragam ke seluruh berkas santri di database lokal Anda.</p>
                  </div>
                  <div className="flex flex-wrap sm:flex-nowrap gap-3 w-full md:w-auto">
                    <div className="w-1/2 md:w-40">
                      <label className="block text-[10px] font-bold text-slate-500 mb-1">Semester</label>
                      <input 
                        type="text" 
                        value={globalSemester}
                        onChange={(e) => setGlobalSemester(e.target.value)}
                        placeholder="Ganjil 2025/2026"
                        className="w-full px-2.5 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-xs font-bold focus:ring-2 focus:ring-[#2b3990] focus:outline-none"
                      />
                    </div>
                    <div className="w-1/2 md:w-48">
                      <label className="block text-[10px] font-bold text-slate-500 mb-1">Tanggal Laporan</label>
                      <input 
                        type="text" 
                        value={globalTanggal}
                        onChange={(e) => setGlobalTanggal(e.target.value)}
                        placeholder="19 Desember 2025"
                        className="w-full px-2.5 py-1.5 bg-slate-50 border border-slate-200 rounded-lg text-xs font-bold focus:ring-2 focus:ring-[#2b3990] focus:outline-none"
                      />
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* TOP CONTROL NAVIGATION DECK */}
            {activeTab === 'report' && students.length > 0 && (

                    <input

                      value={editingStudent.sat} 
                      onChange={(e) => setEditingStudent({...editingStudent, sat: Number(e.target.value)})}
                      className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm font-bold text-indigo-700"
                    />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1">Jumlah Juz (Angka)</label>
                    <input 
                      type="number" 
                      value={editingStudent.tahfizh_juz} 
                      onChange={(e) => setEditingStudent({...editingStudent, tahfizh_juz: Number(e.target.value)})}
                      className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm font-bold text-teal-700"
                    />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1">Keterangan Juz Al-Qur'an</label>
                    <input 
                      type="text" 
                      value={editingStudent.tahfizh_detail} 
                      onChange={(e) => setEditingStudent({...editingStudent, tahfizh_detail: e.target.value})}
                      className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm"
                    />
                  </div>
                  <div className="col-span-2">
                    <label className="block text-xs font-bold text-slate-500 mb-1">Hasil Psikotes</label>
                    <input 
                      type="text" 
                      value={editingStudent.psikotes} 
                      onChange={(e) => setEditingStudent({...editingStudent, psikotes: e.target.value})}
                      className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm"
                    />
                  </div>
                  <div className="col-span-2">
                    <label className="block text-xs font-bold text-slate-500 mb-1">Progres 1 Semester (Kognitif)</label>
                    <input 
                      type="text" 
                      value={editingStudent.progres_1s} 
                      onChange={(e) => setEditingStudent({...editingStudent, progres_1s: e.target.value})}
                      className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm"
                    />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1">Mata Pelajaran Unggul</label>
                    <input 
                      type="text" 
                      value={editingStudent.mapel_unggul} 
                      onChange={(e) => setEditingStudent({...editingStudent, mapel_unggul: e.target.value})}
                      className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm"
                    />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1">Perlu Peningkatan</label>
                    <input 
                      type="text" 
                      value={editingStudent.mapel_perlu} 
                      onChange={(e) => setEditingStudent({...editingStudent, mapel_perlu: e.target.value})}
                      className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm"
                    />
                  </div>
                  
                  {/* Dynamic Signatures Inputs */}
                  <div className="col-span-2 border-t pt-3 mt-1">
                    <h4 className="text-xs font-bold uppercase text-indigo-800 tracking-wider mb-2">Penandatangan Rapor Santri Ini</h4>
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1">Nama Wali Kelas</label>
                    <input 
                      type="text" 
                      value={editingStudent.wali_kelas || ""} 
                      onChange={(e) => setEditingStudent({...editingStudent, wali_kelas: e.target.value})}
                      className="w-full p-2.5 bg-indigo-50/50 border border-slate-200 rounded-lg text-sm font-semibold"
                      placeholder="Ustadz Maulana Azka, Lc."
                    />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1">Nama Wali Kamar</label>
                    <input 
                      type="text" 
                      value={editingStudent.wali_kamar || ""} 
                      onChange={(e) => setEditingStudent({...editingStudent, wali_kamar: e.target.value})}
                      className="w-full p-2.5 bg-indigo-50/50 border border-slate-200 rounded-lg text-sm font-semibold"
                      placeholder="Ustadz Ali Murtadlo"
                    />
                  </div>
                  <div className="col-span-2">
                    <label className="block text-xs font-bold text-slate-500 mb-1">Nama Kepala Sekolah (SMP)</label>
                    <input 
                      type="text" 
                      value={editingStudent.kepala_sekolah || ""} 
                      onChange={(e) => setEditingStudent({...editingStudent, kepala_sekolah: e.target.value})}
                      className="w-full p-2.5 bg-indigo-50/50 border border-slate-200 rounded-lg text-sm font-semibold"
                      placeholder="Ustadz Abd. Halim, S.S.I"
                    />
                  </div>

                  <div className="col-span-2 border-t pt-3">
                    <label className="block text-xs font-bold text-slate-500 mb-1">Observasi Ibadah Harian</label>
                    <textarea 
                      value={editingStudent.ibadah} 
                      onChange={(e) => setEditingStudent({...editingStudent, ibadah: e.target.value})}
                      className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm h-16 resize-none"
                    />
                  </div>
                  <div className="col-span-2">
                    <label className="block text-xs font-bold text-slate-500 mb-1">Sikap dan Disiplin</label>
                    <textarea 
                      value={editingStudent.disiplin} 
                      onChange={(e) => setEditingStudent({...editingStudent, disiplin: e.target.value})}
                      className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm h-16 resize-none"
                    />
                  </div>
                  <div className="col-span-2">
                    <label className="block text-xs font-bold text-slate-500 mb-1">Sosial & Kepemimpinan</label>
                    <textarea 
                      value={editingStudent.sosial} 
                      onChange={(e) => setEditingStudent({...editingStudent, sosial: e.target.value})}
                      className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm h-16 resize-none"
                    />
                  </div>
                  <div className="col-span-2">
                    <label className="block text-xs font-bold text-slate-500 mb-1">Prestasi Non-Akademik</label>
                    <input 
                      type="text" 
                      value={editingStudent.prestasi} 
                      onChange={(e) => setEditingStudent({...editingStudent, prestasi: e.target.value})}
                      className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm"
                    />
                  </div>
                  <div className="col-span-2">
                    <label className="block text-xs font-bold text-slate-500 mb-1">Fokus Kelas Selanjutnya</label>
                    <textarea 
                      value={editingStudent.fokus} 
                      onChange={(e) => setEditingStudent({...editingStudent, fokus: e.target.value})}
                      className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm h-16 resize-none"
                    />
                  </div>
                  <div className="col-span-2">
                    <label className="block text-xs font-bold text-slate-500 mb-1">Pesan Wali Kelas & Kamar</label>
                    <textarea 
                      value={editingStudent.pesan_wali} 
                      onChange={(e) => setEditingStudent({...editingStudent, pesan_wali: e.target.value})}
                      className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg text-sm h-16 resize-none"
                    />
                  </div>
                </div>

                <div className="flex justify-end gap-2 pt-4 border-t">
                  <button 
                    onClick={() => {
                      setEditingStudent(null);
                      setIsAddingNew(false);
                    }}
                    className="px-4 py-2 text-sm font-semibold text-slate-500 hover:bg-slate-100 rounded-lg transition"
                  >
                    Batal
                  </button>
                  <button 
                    onClick={() => handleSaveStudent(editingStudent)}
                    className="px-4 py-2 text-sm font-semibold text-white bg-[#2b3990] hover:bg-[#1f2a70] rounded-lg transition shadow"
                  >
                    Simpan
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* EXCEL/SHEETS IMPORT MODAL */}
          {showImportModal && (
            <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-2xl p-6 space-y-4">
                <div className="flex justify-between items-start border-b pb-2">
                  <div>
                    <h3 className="text-lg font-bold text-slate-900">📥 Impor dari Excel / Google Sheets</h3>
                    <p className="text-xs text-slate-500">Salin kolom dari spreadsheet Anda lalu tempel di bawah ini.</p>
                  </div>
                  <button 
                    onClick={getTemplateTSV}
                    className="text-xs bg-indigo-50 text-indigo-700 font-bold px-3 py-1.5 rounded-lg hover:bg-indigo-100 transition"
                  >
                    Ambil Template Contoh
                  </button>
                </div>

                <div className="space-y-2">
                  <textarea 
                    placeholder="Tempel baris spreadsheet Anda di sini..."
                    value={bulkImportText} 
                    onChange={(e) => setBulkImportText(e.target.value)}
                    className="w-full h-64 p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-mono resize-none focus:ring-2 focus:ring-indigo-500 focus:outline-none"
                  />
                </div>

                <div className="flex justify-between items-center pt-4 border-t">
                  <span className="text-xs text-slate-400">Pastikan baris pertama berisi tajuk (header) kolom.</span>
                  <div className="flex gap-2">
                    <button 
                      onClick={() => setShowImportModal(false)}
                      className="px-4 py-2 text-sm font-semibold text-slate-500 hover:bg-slate-100 rounded-lg transition"
                    >
                      Batal
                    </button>
                    <button 
                      onClick={handleImportTSV}
                      className="px-4 py-2 text-sm font-semibold text-white bg-[#2b3990] hover:bg-[#1f2a70] rounded-lg transition shadow"
                    >
                      Proses & Impor
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* CUSTOM DIALOG ALERT & CONFIRM MODAL */}
          {alertConfig && (
            <div className="fixed inset-0 bg-slate-900/55 backdrop-blur-sm z-[100] flex items-center justify-center p-4 no-print">
              <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 space-y-4 text-center border border-slate-100 animate-in fade-in zoom-in-95 duration-150">
                <div className="w-12 h-12 rounded-full bg-amber-50 text-amber-600 flex items-center justify-center mx-auto text-xl">
                  {alertConfig.type === 'confirm' ? '❓' : '💡'}
                </div>
                <div>
                  <h3 className="text-md font-extrabold text-slate-900">{alertConfig.title}</h3>
                  <p className="text-xs text-slate-500 mt-2 leading-relaxed">{alertConfig.message}</p>
                </div>
                <div className="flex justify-center gap-2 pt-2">
                  {alertConfig.type === 'confirm' && (
                    <button
                      onClick={() => setAlertConfig(null)}
                      className="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold text-xs uppercase tracking-wider rounded-xl transition"
                    >
                      Batal
                    </button>
                  )}
                  <button
                    onClick={() => {
                      if (alertConfig.type === 'confirm' && alertConfig.onConfirm) {
                        alertConfig.onConfirm();
                      }
                      setAlertConfig(null);
                    }}
                    className="px-5 py-2.5 bg-[#2b3990] hover:bg-[#1f2a70] text-white font-bold text-xs uppercase tracking-wider rounded-xl transition shadow-sm"
                  >
                    {alertConfig.type === 'confirm' ? 'Ya, Hapus' : 'Selesai'}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* Footer (Hidden during printing) */}
          <footer className="bg-slate-900 text-slate-400 py-4 text-center text-xs print:hidden border-t border-slate-800">
            <p>© 2026 MALIKA ISLAMIC BOARDING SCHOOL • Tangerang, Banten</p>
          </footer>
        </div>
      );
    }

    // Mount Application to root DOM element
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
